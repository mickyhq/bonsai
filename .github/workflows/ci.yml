name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test
      - name: Build release binary
        run: cargo build --release
      - name: CLI integration tests
        run: BONSAI_BIN=target/release/bonsai bash tests/cli_integration.sh
      - name: CLI output smoke test
        run: BONSAI_BIN=target/release/bonsai bash tests/cli_output_smoke.sh
      - name: Plugin smoke tests
        run: bash tests/plugin_binary_lookup.sh
      - name: Release asset smoke test
        run: bash tests/release_assets_smoke.sh
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: bonsai-linux-x64
          path: target/release/bonsai

  vscode:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: copilot/bonsai-vscode/package-lock.json
      - name: Install extension dependencies
        run: npm ci
        working-directory: copilot/bonsai-vscode
      - name: Compile extension
        run: npm run compile
        working-directory: copilot/bonsai-vscode
      - name: Package VSIX
        run: npm run package
        working-directory: copilot/bonsai-vscode
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: bonsai-vscode-vsix
          path: copilot/bonsai-vscode/bonsai-vscode-*.vsix
